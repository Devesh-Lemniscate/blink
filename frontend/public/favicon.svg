<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a" />
      <stop offset="100%" style="stop-color:#0a0a0a" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="50%" style="stop-color:#e0e0e0" />
      <stop offset="100%" style="stop-color:#a0a0a0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="#333" stroke-width="1.5"/>
  
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#222" stroke-width="1"/>
  
  <!-- Speed lines (motion blur effect) -->
  <g opacity="0.4">
    <path d="M10 22 L18 22" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 28 L16 28" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <path d="M6 34 L16 34" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 40 L16 40" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <path d="M10 46 L18 46" stroke="#666" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Lightning Bolt (Speed Symbol) -->
  <path 
    d="M40 8 L24 32 L34 32 L22 56 L48 28 L36 28 L46 8 Z" 
    fill="url(#boltGrad)" 
    stroke="#fff" 
    stroke-width="0.5"
    filter="url(#glow)"
  />
  
  <!-- Highlight on bolt -->
  <path 
    d="M40 10 L38 16 L42 10 Z" 
    fill="#fff" 
    opacity="0.6"
  />
</svg>
